# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: fluidra.mm.consignmentsettle
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: virtualds4
          url: http://virtualds4:44300
          client: '050'
        app:
          name: ZFE_MM_CONSGNPO
          description: Settle Consignment Init
          package: ZMM_T3
          transport: DS4K905272
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
